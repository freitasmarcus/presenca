<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Registro de Presença</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container">

<div class="logos">
<!-- LOGOTIPOS -->
<!-- LOGOTIPO FASSEB -->
<img src="1.png" width="80">
<!-- LOGOTIPO DEPTO DE ENSINO -->
<img src="2.jpeg" width="80">
<!-- LOGOTIPO AD PORANGATU -->
<img src="3.png" width="80">
</div>

<h2>Registre sua presença abaixo</h2>

<input type="text" id="nome" list="nomes" placeholder="Digite seu nome">
<datalist id="nomes"></datalist>

<input 
  type="text" 
  id="cpf" 
  placeholder="CPF (somente números)"
  maxlength="11"
  inputmode="numeric"
  pattern="[0-9]{11}"
  oninput="this.value = this.value.replace(/[^0-9]/g, '')"
>
<button onclick="registrar()">Registrar Presença</button>

<p id="msg"></p>

</div>

<script src="js/app.js"></script>
</body>
</html>
